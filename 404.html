<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Beyonix</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Manrope:wght@400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --void: #0A0E1A;
            --deep: #151B2E;
            --electric: #00F0FF;
            --magenta: #FF0080;
            --steel: #B8C5D6;
            --ghost: #E8EEF5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--void);
            color: var(--ghost);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .geometric-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 240, 255, 0.03) 2px, rgba(0, 240, 255, 0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255, 0, 128, 0.03) 2px, rgba(255, 0, 128, 0.03) 4px);
            background-size: 80px 80px;
            z-index: 0;
            animation: gridShift 20s linear infinite;
        }

        @keyframes gridShift {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(80px, 80px);
            }
        }

        /* Gradient Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--electric), transparent);
            top: -250px;
            right: -250px;
            animation: float1 25s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--magenta), transparent);
            bottom: -200px;
            left: -200px;
            animation: float2 20s ease-in-out infinite;
        }

        @keyframes float1 {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(-100px, 100px) scale(1.2);
            }
        }

        @keyframes float2 {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(100px, -50px) scale(1.1);
            }
        }

        /* Main Content */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 150px;
            height: 150px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.15), transparent 70%);
            filter: blur(40px);
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(0.7);
            }

            50% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        .logo img {
            position: relative;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 40px rgba(0, 240, 255, 0.4));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .error-code {
            font-family: 'Audiowide', cursive;
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 400;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--electric), var(--magenta));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: shimmer 3s linear infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 0%;
            }

            100% {
                background-position: 200% 0%;
            }
        }

        h1 {
            font-family: 'Audiowide', cursive;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 400;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--steel);
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-block;
            padding: 1.2rem 3rem;
            background: linear-gradient(135deg, var(--electric), var(--magenta));
            color: var(--void);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 2px solid transparent;
        }

        .btn-home:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 60px rgba(0, 240, 255, 0.5);
        }

        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .logo {
                width: 100px;
                height: 100px;
            }

            .error-code {
                font-size: 6rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            p {
                font-size: 1rem;
            }

            .btn-home {
                padding: 1rem 2rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <!-- Background Elements -->
    <div class="geometric-pattern"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="logo">
            <div class="logo-glow"></div>
            <img src="beyonix-logo.png" alt="Beyonix Logo">
        </div>

        <div class="error-code">404</div>

        <h1>Page Not Found</h1>

        <p>
            Looks like this page got lost in the code. <br>
            Don't worry, even the best developers hit 404s sometimes!
        </p>

        <a href="index.html" class="btn-home">
            Back to Home
        </a>
    </div>
</body>

</html>
